<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MappingTrace</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="globalCSS.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .auth-container {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            background: linear-gradient(135deg, #2c6e49 0%, #4CAF50 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .auth-header i {
            font-size: 56px;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.95);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        
        .auth-header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
        }
        
        .auth-header p {
            margin: 10px 0 0;
            opacity: 0.9;
            font-size: 15px;
            position: relative;
        }
        
        .auth-body {
            padding: 40px 30px;
            background: white;
        }
        
        .error-message {
            background: #fee2e2;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .error-message i {
            color: #f44336;
            font-size: 18px;
        }
        
        .error-message p {
            margin: 0;
            flex: 1;
            color: #991b1b;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        
        .form-group label i {
            margin-right: 5px;
            color: #2c6e49;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        .form-group input:focus {
            border-color: #2c6e49;
            outline: none;
            box-shadow: 0 0 0 4px rgba(44, 110, 73, 0.1);
        }
        
        .password-field {
            position: relative;
        }
        
        .password-field input {
            padding-right: 45px;
        }
        
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            font-size: 18px;
        }
        
        .password-strength {
            margin-top: 10px;
            height: 6px;
            background: #edf2f7;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 3px;
        }
        
        .password-strength-text {
            font-size: 12px;
            margin-top: 5px;
            text-align: right;
        }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2c6e49 0%, #4CAF50 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(44, 110, 73, 0.3);
        }
        
        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #edf2f7;
        }
        
        .auth-footer a {
            color: #2c6e49;
            text-decoration: none;
            font-weight: 600;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }
        
        .notification-success { background: #4CAF50; }
        .notification-error { background: #F44336; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .loading i {
            font-size: 32px;
            margin-bottom: 10px;
            color: #2c6e49;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-lock-open"></i>
            <h1>Reset Password</h1>
            <p>Enter your new password</p>
        </div>
        
        <div class="auth-body">
            <div id="errorMessage" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <p id="errorText"></p>
            </div>
            
            <div id="loadingMessage" class="loading" style="display: flex; flex-direction: column; align-items: center;">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Verifying reset link...</p>
            </div>
            
            <div id="resetFormContainer" style="display: none;">
                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label for="newPassword">
                            <i class="fas fa-lock"></i>
                            New Password
                        </label>
                        <div class="password-field">
                            <input type="password" id="newPassword" placeholder="Enter new password" required>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', this)"></i>
                        </div>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="passwordStrengthBar"></div>
                        </div>
                        <div class="password-strength-text" id="passwordStrengthText"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-check-circle"></i>
                            Confirm Password
                        </label>
                        <div class="password-field">
                            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="auth-btn" id="resetBtn">
                        <i class="fas fa-save"></i>
                        <span>Reset Password</span>
                    </button>
                </form>
            </div>
            
            <div class="auth-footer">
                <p><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>

    <!-- Supabase library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://vzrufmelftbqpsemnjbd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6cnVmbWVsZnRicXBzZW1uamJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNzYwNTMsImV4cCI6MjA4NjY1MjA1M30.1NPN666Lt9WZHupvp_XIFu-SnsaextHH_JvXgQPtyV0';
        
        console.log('✅ Reset Password: Supabase credentials loaded');
        
        let supabaseClient = null;
        
        function initSupabase(retryCount = 0) {
            if (typeof window.supabase === 'undefined') {
                if (retryCount < 10) {
                    console.log(`⏳ Waiting for Supabase... (${retryCount + 1}/10)`);
                    setTimeout(() => initSupabase(retryCount + 1), 500);
                    return;
                }
                console.error('❌ Supabase library failed to load');
                return;
            }
            
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                window.supabase = supabaseClient;
                console.log('✅ Reset Password: Supabase initialized');
                checkRecoverySession();
            } catch (err) {
                console.error('❌ Supabase init error:', err);
                if (retryCount < 5) {
                    setTimeout(() => initSupabase(retryCount + 1), 1000);
                }
            }
        }
        
        async function checkRecoverySession() {
            const loadingDiv = document.getElementById('loadingMessage');
            const formContainer = document.getElementById('resetFormContainer');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            try {
                // Check URL hash for error
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const error = hashParams.get('error');
                const errorDesc = hashParams.get('error_description');
                
                if (error) {
                    console.log('❌ Error from URL:', error, errorDesc);
                    loadingDiv.style.display = 'none';
                    errorText.textContent = errorDesc || 'The reset link is invalid or has expired. Please request a new one.';
                    errorDiv.style.display = 'flex';
                    formContainer.style.display = 'none';
                    return;
                }
                
                // Get the current session
                const { data: { session }, error: sessionError } = await window.supabase.auth.getSession();
                
                if (sessionError) {
                    throw sessionError;
                }
                
                if (session) {
                    console.log('✅ Valid recovery session found for:', session.user.email);
                    loadingDiv.style.display = 'none';
                    formContainer.style.display = 'block';
                } else {
                    console.log('⚠️ No recovery session found');
                    loadingDiv.style.display = 'none';
                    errorText.textContent = 'Invalid or expired reset link. Please request a new one.';
                    errorDiv.style.display = 'flex';
                    formContainer.style.display = 'none';
                }
            } catch (err) {
                console.error('Session check error:', err);
                loadingDiv.style.display = 'none';
                errorText.textContent = 'Error verifying reset link. Please try again.';
                errorDiv.style.display = 'flex';
                formContainer.style.display = 'none';
            }
        }
        
        initSupabase();
        
        // Notification system
        const notification = {
            show: function(message, type = 'info', duration = 5000) {
                const container = document.getElementById('notificationContainer');
                if (!container) return;
                
                const notification = document.createElement('div');
                notification.className = `notification notification-${type}`;
                notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
                container.appendChild(notification);
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, duration);
            },
            success: function(msg) { this.show(msg, 'success'); },
            error: function(msg) { this.show(msg, 'error'); }
        };
        
        window.togglePassword = function(fieldId, icon) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };
        
        function checkPasswordStrength(password) {
            let score = 0;
            if (password.length >= 8) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;
            
            const strength = score <= 2 ? 'Weak' : score <= 3 ? 'Fair' : score <= 4 ? 'Good' : 'Strong';
            const color = score <= 2 ? '#f44336' : score <= 3 ? '#ff9800' : score <= 4 ? '#2196f3' : '#4caf50';
            return { strength, color, score };
        }
        
        document.getElementById('newPassword')?.addEventListener('input', function(e) {
            const { strength, color } = checkPasswordStrength(e.target.value);
            const bar = document.getElementById('passwordStrengthBar');
            const text = document.getElementById('passwordStrengthText');
            if (bar && text) {
                bar.style.width = (checkPasswordStrength(e.target.value).score * 20) + '%';
                bar.style.backgroundColor = color;
                text.textContent = strength;
                text.style.color = color;
            }
        });
        
        document.getElementById('resetPasswordForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            
            if (!newPassword || !confirmPassword) {
                notification.error('Please fill in all fields');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                notification.error('Passwords do not match');
                return;
            }
            
            if (newPassword.length < 8) {
                notification.error('Password must be at least 8 characters');
                return;
            }
            
            const { strength, score } = checkPasswordStrength(newPassword);
            if (score < 3) {
                notification.warning(`Password is ${strength}. Please use a stronger password.`);
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            
            try {
                const { error } = await window.supabase.auth.updateUser({ password: newPassword });
                if (error) throw error;
                
                notification.success('Password updated! Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'login.html?password_reset=true';
                }, 2000);
            } catch (error) {
                notification.error(error.message || 'Failed to reset password');
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
            }
        });
    </script>
</body>
</html>
